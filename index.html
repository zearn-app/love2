<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Gift ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ffd6e0, #ffeaf3);
  overflow-x: hidden;
  text-align: center;
}

/* Center Layout */
.page {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.active {
  display: flex;
}

/* Loading */
.heart {
  font-size: 50px;
  animation: beat 1s infinite;
}

@keyframes beat {
  0% {transform: scale(1);}
  50% {transform: scale(1.3);}
  100% {transform: scale(1);}
}

.progress {
  width: 200px;
  height: 6px;
  background: #eee;
  border-radius: 10px;
  margin-top: 20px;
  overflow: hidden;
}

.progress span {
  display: block;
  height: 100%;
  width: 0%;
  background: #ff4d88;
  animation: load 3s forwards;
}

@keyframes load {
  to {width: 100%;}
}

/* Card */
.card {
  background: white;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  width: 90%;
  max-width: 320px;
}

/* Input */
input {
  width: 80%;
  padding: 10px;
  border-radius: 20px;
  border: 2px solid #ff4d88;
  outline: none;
  text-align: center;
  margin: 10px 0;
}

/* Button */
button {
  background: linear-gradient(45deg, #ff4d88, #ff7eb3);
  border: none;
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  cursor: pointer;
}

/* Story */
.title {
  font-family: 'Pacifico', cursive;
  font-size: 28px;
  color: #ff4d88;
}

.btn {
  margin-top: 15px;
}

/* Gallery */
.gallery img {
  width: 200px;
  border-radius: 15px;
  margin: 10px;
}

/* Floating hearts */
.heart-float {
  position: fixed;
  bottom: -20px;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
  color: pink;
}

@keyframes floatUp {
  0% {transform: translateY(0);}
  100% {transform: translateY(-100vh);}
}

</style>
</head>

<body>

<!-- Loading Page -->
<div class="page active" id="loading">
  <div class="heart">❤️</div>
  <p>Take a deep breath, my love...</p>
  <div class="progress"><span></span></div>
</div>

<!-- Lock Page -->
<div class="page" id="lock">
  <div class="card">
    <h3>A little secret 🔐</h3>
    <p>Enter the code to unlock love</p>
    <input id="code" type="password" placeholder="Enter code">
    <br>
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<!-- Story Page -->
<div class="page" id="story">
  <div class="card">
    <img src="pf.jpeg">
    <h2 class="title">Our Special Story</h2>
    <p>Hey Cutiepie 💖<br>You are my everything</p>
    <button class="btn" onclick="nextPage('anniversary')">Open Our Story</button>
  </div>
</div>

<!-- Anniversary -->
<div class="page" id="anniversary">
  <div class="card">
    <h2>Happy Anniversary 🎉</h2>
    <h1 id="days">0</h1>
    <p>Beautiful Days Together</p>
    <button onclick="nextPage('gallery')">See Memories</button>
  </div>
</div>

<!-- Gallery -->
<div class="page" id="gallery">
  <div class="card">
    <h2>Our Precious Moments 📸</h2>
    <div class="gallery">
      <img src="https://picsum.photos/200?1">
      <img src="https://picsum.photos/200?2">
      <img src="https://picsum.photos/200?3">
    </div>
  </div>
</div>

<script>

// Page switch
function nextPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// Loading to lock
setTimeout(() => {
  nextPage("lock");
}, 3000);

// Unlock logic
function unlock() {
  const code = document.getElementById("code").value;
  if(code === "143") {
    nextPage("story");
  } else {
    alert("Wrong code 😢");
  }
}

// Anniversary counter
const startDate = new Date("2023-01-01");
const today = new Date();
const diff = Math.floor((today - startDate) / (1000*60*60*24));
document.getElementById("days").innerText = diff;

// Floating hearts
setInterval(() => {
  const heart = document.createElement("div");
  heart.className = "heart-float";
  heart.innerText = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 500);

</script>

</body>
</html>
